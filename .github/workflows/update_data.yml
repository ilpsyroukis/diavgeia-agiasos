name: Update Diavgeia Data

on:
  schedule:
    - cron: '0 2 * * *' # Παίζει κάθε μέρα στις 2 τα ξημερώματα (UTC)
  workflow_dispatch: # Επιτρέπει και τη χειροκίνητη εκτέλεση!

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Απαραίτητο για το commiting

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests pypdf

      - name: Run Update Script
        run: python scripts/update_db.py

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data.json
          git status
          # Αν δεν υπάρχουν αλλαγές, το script τερματίζει ομαλά
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update Diavgeia Data: $(date -u +'%Y-%m-%d')"
          git push
