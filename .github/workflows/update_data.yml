name: Update Diavgeia Data

on:
  schedule:
    - cron: '0 2 * * *' # Every day at 2 AM (UTC)
  workflow_dispatch: # Manual trigger allowed

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required for committing changes

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for cleaner merging

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Update Script
        run: python scripts/update_db.py

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data.json
          
          # Only commit if there are changes
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update Diavgeia Data: $(date -u +'%Y-%m-%d')"
            # Pull with rebase to handle small race conditions
            git pull --rebase origin main
            git push
          fi
